name: Chengla Coupang

on:
  repository_dispatch:
    types: [run-chengla-coupang]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      # ✅ Python 3.10 강제 지정
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ✅ 패키지 설치
      - name: Install dependencies
        run: py -3.10 -m pip install -r requirements.txt
        shell: cmd

      # ✅ 스크립트 실행
      - name: Run Coupang Auto Script
        run: py -3.10 2-chengla-coupang-auto.py
        shell: cmd
        env:
          CHENGLA_COUPANG_ID: ${{ secrets.CHENGLA_COUPANG_ID }}
          CHENGLA_COUPANG_PW: ${{ secrets.CHENGLA_COUPANG_PW }}
          SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.SERVICE_ACCOUNT_JSON_BASE64 }}
          PYTHONIOENCODING: utf-8
