name: Chengla Coupang

on:
  repository_dispatch:
    types: [run-chengla-coupang]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Check Python
        run: '"C:\Users\day9b\venv\Scripts\Python.exe" --version'
        shell: cmd

      - name: Install dependencies
        run: '"C:\Users\day9b\venv\Scripts\Python.exe" -m pip install -r requirements.txt'
        shell: cmd

      - name: Run Coupang Auto Script
        run: '"C:\Users\day9b\venv\Scripts\Python.exe" 2-chengla-coupang-auto.py'
        shell: cmd
        env:
          CHENGLA_COUPANG_ID: ${{ secrets.CHENGLA_COUPANG_ID }}
          CHENGLA_COUPANG_PW: ${{ secrets.CHENGLA_COUPANG_PW }}
          SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.SERVICE_ACCOUNT_JSON_BASE64 }}
          PYTHONIOENCODING: utf-8
